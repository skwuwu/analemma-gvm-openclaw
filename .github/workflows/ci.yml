# CI: MCP server build + integration tests with GVM proxy.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GVM_PROXY_URL: http://127.0.0.1:8080
  GVM_AGENT_ID: ci-agent

jobs:
  build:
    name: Build MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install and build
        working-directory: mcp-server
        run: |
          npm install
          npm run build
      - name: Verify dist exists
        run: test -f mcp-server/dist/index.js

  integration:
    name: MCP + Proxy Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: proxy

      - name: Clone and build GVM proxy
        run: |
          git clone --depth 1 https://github.com/skwuwu/Analemma-GVM.git proxy
          cd proxy
          cargo build --release -p gvm-proxy

      - name: Load rulesets into proxy config
        run: |
          python3 << 'PYEOF'
          import os
          rulesets = 'rulesets'
          config = 'proxy/config'
          parts = []
          for f in ['_default.toml', 'github.toml', 'slack.toml', 'web-browsing.toml']:
              path = os.path.join(rulesets, f)
              if os.path.exists(path):
                  parts.append('# -- ' + f + ' --\n' + open(path).read())
          open(os.path.join(config, 'srr_network.toml'), 'w').write('\n'.join(parts))
          print(f'{len(parts)} rulesets loaded')
          PYEOF

      - name: Start proxy
        run: |
          cd proxy
          ./target/release/gvm-proxy --config config/proxy.toml > /tmp/gvm-proxy.log 2>&1 &
          echo $! > /tmp/gvm-proxy.pid
          sleep 3
          curl -sf http://127.0.0.1:8080/gvm/health || { echo "Proxy failed:"; cat /tmp/gvm-proxy.log; exit 1; }

      - name: Verify MCP server + proxy connectivity
        run: |
          echo "=== MCP server smoke test ==="
          RAW=$(python3 scripts/mcp_call.py gvm_status)
          echo "Raw response: $RAW"
          echo "$RAW" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(f'Proxy: {d.get(\"proxy\",\"?\")}'); assert d.get('proxy')=='running' or 'error' not in d, f'Unexpected: {d}'"

      - name: Test gvm_policy_check (Allow)
        run: |
          RAW=$(python3 scripts/mcp_call.py gvm_policy_check '{"method":"GET","url":"https://api.github.com/repos/test/test/issues"}')
          echo "Raw: $RAW"
          DECISION=$(echo "$RAW" | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('decision','?'))")
          echo "Decision: $DECISION"
          [ "$DECISION" = "Allow" ] || { echo "FAIL: expected Allow"; exit 1; }

      - name: Test gvm_policy_check (Deny)
        run: |
          RAW=$(python3 scripts/mcp_call.py gvm_policy_check '{"method":"DELETE","url":"https://api.github.com/repos/test/test/git/refs/heads/main"}')
          echo "Raw: $RAW"
          DECISION=$(echo "$RAW" | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('decision','?'))")
          echo "Decision: $DECISION"
          [ "$DECISION" = "Deny" ] || { echo "FAIL: expected Deny"; exit 1; }

      - name: Test gvm_fetch (Deny blocks execution)
        run: |
          RAW=$(python3 scripts/mcp_call.py gvm_fetch '{"operation":"github.merge_pr","method":"PUT","url":"https://api.github.com/repos/test/test/pulls/1/merge"}')
          echo "Raw: $RAW"
          echo "$RAW" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); assert d.get('blocked') or 'Deny' in str(d.get('decision','')), f'Expected blocked/Deny: {d}'"

      - name: Test gvm_select_rulesets (list)
        run: |
          RAW=$(python3 scripts/mcp_call.py gvm_select_rulesets)
          echo "Raw: $RAW"
          echo "$RAW" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); names=[r['name'] for r in d.get('available',[])]; assert 'github' in names, f'github not in {names}'"

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/gvm-proxy.pid 2>/dev/null) 2>/dev/null || true
          echo "=== Proxy log (last 20 lines) ==="
          tail -20 /tmp/gvm-proxy.log 2>/dev/null || true
