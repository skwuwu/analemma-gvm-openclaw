# GVM Ruleset: Spotify
# Covers: spotify-player skill
# Domains: api.spotify.com

[[rules]]
pattern = "api.spotify.com/v1/search"
method = "GET"
decision = { type = "Allow" }
reason = "Search tracks/albums (read-only)"

[[rules]]
pattern = "api.spotify.com/v1/me/player"
method = "GET"
decision = { type = "Allow" }
reason = "Get playback state (read-only)"

[[rules]]
pattern = "api.spotify.com/v1/me/player/devices"
method = "GET"
decision = { type = "Allow" }
reason = "List devices (read-only)"

[[rules]]
pattern = "api.spotify.com/v1/me/player/*"
method = "PUT"
decision = { type = "Allow" }
reason = "Playback control (play/pause/skip -- low risk)"

[[rules]]
pattern = "api.spotify.com/v1/me/player/*"
method = "POST"
decision = { type = "Allow" }
reason = "Playback control (next/previous -- low risk)"
