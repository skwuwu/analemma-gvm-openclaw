# GVM Ruleset: GitHub
# Covers: github skill, gh-issues skill, coding-agent skill
# Domains: api.github.com

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/pulls$"
method = "GET"
decision = { type = "Allow" }
reason = "List pull requests (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/pulls/.*"
method = "GET"
decision = { type = "Allow" }
reason = "Get pull request details (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues$"
method = "GET"
decision = { type = "Allow" }
reason = "List issues (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues/.*"
method = "GET"
decision = { type = "Allow" }
reason = "Get issue details (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/actions/runs$"
method = "GET"
decision = { type = "Allow" }
reason = "List CI runs (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/commits$"
method = "GET"
decision = { type = "Allow" }
reason = "List commits (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/labels$"
method = "GET"
decision = { type = "Allow" }
reason = "List labels (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/contents/.*"
method = "GET"
decision = { type = "Allow" }
reason = "Read file contents (read-only)"

# Write operations -- Delay for audit trail
[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues$"
method = "POST"
decision = { type = "Delay", milliseconds = 300 }
reason = "Create issue (write -- delayed for audit)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues/[^/]+/comments$"
method = "POST"
decision = { type = "Delay", milliseconds = 300 }
reason = "Add comment (write -- delayed for audit)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/pulls$"
method = "POST"
decision = { type = "Delay", milliseconds = 300 }
reason = "Create pull request (write -- delayed for audit)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues/.*"
method = "PATCH"
decision = { type = "Delay", milliseconds = 300 }
reason = "Update issue/PR (write -- delayed for audit)"

# Deny dangerous operations
[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/git/refs/.*"
method = "DELETE"
decision = { type = "Deny", reason = "Delete branch (destructive -- blocked)" }

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/pulls/[^/]+/merge$"
method = "PUT"
decision = { type = "Deny", reason = "PR merge blocked (manual only)" }
description = "GitHub: PR merge blocked"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+$"
method = "DELETE"
decision = { type = "Deny", reason = "Repository deletion blocked" }
description = "GitHub: repo delete blocked"
