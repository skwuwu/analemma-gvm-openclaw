# GVM Ruleset: OpenAI
# Covers: openai-image-gen, openai-whisper-api skills
# Domains: api.openai.com

# Read / inference -- Allow (cost tracked via WAL)
[[rules]]
pattern = "api.openai.com/v1/chat/completions"
method = "POST"
decision = { type = "Allow" }
reason = "Chat completion (inference -- cost tracked)"

[[rules]]
pattern = "api.openai.com/v1/audio/transcriptions"
method = "POST"
decision = { type = "Allow" }
reason = "Whisper transcription (inference -- cost tracked)"

[[rules]]
pattern = "api.openai.com/v1/images/generations"
method = "POST"
decision = { type = "Delay", milliseconds = 500 }
reason = "Image generation (cost -- delayed for audit)"

[[rules]]
pattern = "api.openai.com/v1/embeddings"
method = "POST"
decision = { type = "Allow" }
reason = "Embeddings (inference -- cost tracked)"

[[rules]]
pattern = "api.openai.com/v1/models"
method = "GET"
decision = { type = "Allow" }
reason = "List models (read-only)"

# Deny destructive / admin operations
[[rules]]
pattern = "api.openai.com/v1/fine_tuning/*"
method = "*"
decision = { type = "Deny", reason = "Fine-tuning (admin operation -- blocked)" }

[[rules]]
pattern = "api.openai.com/v1/files"
method = "DELETE"
decision = { type = "Deny", reason = "Delete files (destructive -- blocked)" }
